<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #09090b; /* zinc-950 */
      color: #fafafa;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Main Card ─── */
    .login-container {
      width: 100%;
      max-width: 440px;
      background-color: #18181b; /* zinc-900 */
      border: 1px solid #27272a; /* zinc-800 */
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    .header-text {
      margin-bottom: 24px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 14px;
      color: #a1a1aa; /* zinc-400 */
    }

    /* ─── Form ─── */
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background-color: #18181b;
      border: 1px solid #3f3f46; /* zinc-700 */
      color: #fafafa;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input::placeholder {
      color: #71717a; /* zinc-500 */
    }

    .form-input:focus {
      border-color: #52525b; /* zinc-600 */
    }

    /* ─── Actions ─── */
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, color 0.2s;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: #27272a; /* zinc-800 */
      color: #a1a1aa; /* zinc-400 */
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: #3f3f46; /* zinc-700 */
      color: #fafafa;
    }

    .btn-primary {
      background-color: #f4f4f5; /* zinc-100 */
      color: #09090b; /* zinc-950 */
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #e4e4e7; /* zinc-200 */
    }

    /* ─── Alerts ─── */
    .alert {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .alert-error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      display: block;
    }

    /* ─── Modal Background ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    /* ─── Modal ─── */
    .modal-content {
      width: 100%;
      max-width: 440px;
      background-color: #09090b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 24px;
      position: relative;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    .btn-close-modal {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: none;
      color: #a1a1aa;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
    }
    
    .btn-close-modal:hover {
      color: #fafafa;
    }

    .btn-close-modal svg {
      width: 16px; 
      height: 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 6px;
    }

    .modal-desc {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .token-display-wrap {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .token-readonly {
      flex: 1;
      background-color: #18181b;
      border: 1px solid #3f3f46;
      color: #fafafa;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      outline: none;
    }

    /* Blink animation for masking */
    .token-skeleton {
      animation: blink 1.5s infinite;
      color: #71717a !important; 
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .btn-copy {
      background-color: #f4f4f5;
      color: #09090b;
      border: none;
      border-radius: 8px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background-color 0.2s;
    }
    
    .btn-copy:hover {
      background-color: #e4e4e7;
    }

    .btn-copy svg {
      width: 18px;
      height: 18px;
    }

    /* ─── Toast Notifications ─── */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 999;
      pointer-events: none; /* Let clicks pass through empty space */
    }

    .toast {
      background-color: #18181b;
      border: 1px solid #27272a;
      color: #fafafa;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
      transform: translateX(100%);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }
    
    .toast-icon.success {
      color: #22c55e;
    }

    .toast-icon.error {
      color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- Main Login Card -->
  <div class="login-container">
    <div class="header-text">
      <h1 class="title">Sign in</h1>
      <p class="subtitle">Sign in to your account using token.</p>
    </div>

    <div id="errorBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="label" for="token">Token</label>
        <input 
          type="text" 
          id="token" 
          class="form-input" 
          placeholder="Enter your token..."
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" id="btnCreateAccount">
          Create an account
        </button>
        <button type="submit" class="btn btn-primary" id="btnSignin" disabled>
          Sign in
        </button>
      </div>
    </form>
  </div>

  <!-- Generate Token Modal -->
  <div class="modal-overlay" id="tokenModal">
    <div class="modal-content">
      <button class="btn-close-modal" id="btnCloseIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>

      <h2 class="modal-title">Building your token...</h2>
      <p class="modal-desc">Keep it in safe place. It will be used to log in your account.</p>

      <div id="modalErrorBox"></div>

      <div class="token-display-wrap">
        <input 
          type="text" 
          class="token-readonly" 
          id="generatedTokenInput" 
          readonly 
          placeholder="Wait..."
        >
        <button type="button" class="btn-copy" id="btnCopy" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>

      <div>
        <button type="button" class="btn btn-secondary" id="btnCloseBtn">
          Close
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer"></div>

  <script>
    // --- Toast Notification Logic ---
    function showToast(message, type = 'success') {
      const toastContainer = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      
      const iconSVG = type === 'success' 
        ? `<svg class="toast-icon success" viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
        : `<svg class="toast-icon error" viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

      toast.innerHTML = `${iconSVG} <span>${message}</span>`;
      
      toastContainer.appendChild(toast);
      
      // trigger css animation
      setTimeout(() => toast.classList.add('show'), 10);

      // remove after 3.5 seconds
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // --- Error handling helpers ---
    function showError(msg) {
      document.getElementById('errorBox').innerHTML = `<div class="alert alert-error">${msg}</div>`;
    }
    function clearError() {
      document.getElementById('errorBox').innerHTML = '';
    }
    function showModalError(msg) {
      document.getElementById('modalErrorBox').innerHTML = `<div class="alert alert-error">${msg}</div>`;
    }
    function clearModalError() {
      document.getElementById('modalErrorBox').innerHTML = '';
    }

    // --- Sign In Button state ---
    const tokenInput = document.getElementById('token');
    const btnSignin = document.getElementById('btnSignin');
    
    tokenInput.addEventListener('input', () => {
      btnSignin.disabled = tokenInput.value.trim().length === 0;
    });

    // --- Submit Login ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const tokenValue = tokenInput.value.trim();
      if (!tokenValue) return;

      btnSignin.disabled = true;
      btnSignin.textContent = 'Wait...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: tokenValue })
        });
        const data = await res.json();

        if (data.success) {
          showToast('Login successful!');
          setTimeout(() => {
            window.location.href = data.redirect || '/hub/dashboard';
          }, 800);
        } else {
          showError(data.message || 'Invalid token.');
          showToast('Failed to login', 'error');
          btnSignin.disabled = false;
          btnSignin.textContent = 'Sign in';
        }
      } catch (err) {
        showError('Network error. Try again.');
        showToast('Network error', 'error');
        btnSignin.disabled = false;
        btnSignin.textContent = 'Sign in';
      }
    });

    // --- Modal Logic ---
    const tokenModal = document.getElementById('tokenModal');
    const generatedTokenInput = document.getElementById('generatedTokenInput');
    const btnCreateAccount = document.getElementById('btnCreateAccount');
    const btnCopy = document.getElementById('btnCopy');
    const MASK = '0000-0000-0000-0000';
    let currentToken = '';

    // Wait helper
    const delay = (ms) => new Promise(res => setTimeout(res, ms));

    btnCreateAccount.addEventListener('click', async () => {
      // 1. Reset state & Show Modal
      clearModalError();
      currentToken = '';
      tokenModal.style.display = 'flex';
      btnCreateAccount.disabled = true;
      btnCopy.disabled = true;
      
      // 2. Show Mask skeleton animation
      generatedTokenInput.classList.add('token-skeleton');
      generatedTokenInput.value = MASK;

      // 3. Fake delay of 1.5 - 3 seconds for dramatic UX
      const waitTime = Math.floor(Math.random() * 1500) + 1500; // 1500ms - 3000ms
      await delay(waitTime);

      // 4. Fetch real Token
      try {
        const res = await fetch('/api/generate-key', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();

        // Reveal the real token
        generatedTokenInput.classList.remove('token-skeleton');

        if (data.success) {
          currentToken = data.key;
          generatedTokenInput.value = data.key;
          btnCopy.disabled = false; // Enable copy once generated
          showToast('Token freshly generated! 🎉');
        } else {
          showModalError(data.message || 'Failed to generate token.');
          generatedTokenInput.value = 'Error';
          showToast('Error generating token', 'error');
        }
      } catch (err) {
        generatedTokenInput.classList.remove('token-skeleton');
        showModalError('Network error while generating token.');
        generatedTokenInput.value = 'Error';
        showToast('Network error', 'error');
      } finally {
        btnCreateAccount.disabled = false;
      }
    });

    // --- Copy Logic ---
    btnCopy.addEventListener('click', () => {
      if (!currentToken) return;
      navigator.clipboard.writeText(currentToken).then(() => {
        showToast('Copied to clipboard');
        const ogHTML = btnCopy.innerHTML;
        // Temporary change to check icon
        btnCopy.innerHTML = `<svg viewBox="0 0 24 24" fill="none" style="color: #22c55e;" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => {
          btnCopy.innerHTML = ogHTML;
        }, 1500);
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    });

    // --- Close Modal ---
    function closeModal() {
      tokenModal.style.display = 'none';
      // Auto-fill token field if generated
      if (currentToken) {
        tokenInput.value = currentToken;
        btnSignin.disabled = false;
      }
    }

    document.getElementById('btnCloseIcon').addEventListener('click', closeModal);
    document.getElementById('btnCloseBtn').addEventListener('click', closeModal);
    
    // Close on backdrop click
    tokenModal.addEventListener('click', (e) => {
      if (e.target === tokenModal) {
        closeModal();
      }
    });

  </script>
</body>
</html>
